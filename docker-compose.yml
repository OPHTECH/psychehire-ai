services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: psychehire
      POSTGRES_PASSWORD: psychehire
      POSTGRES_DB: psychehire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  api:
    build:
      context: .
      dockerfile: infra/api.Dockerfile
    env_file: .env.example
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
  ml-service:
    build:
      context: apps/ml-service
      dockerfile: ../../infra/ml.Dockerfile
    ports:
      - "8000:8000"
  web:
    build:
      context: .
      dockerfile: infra/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  pgdata:

